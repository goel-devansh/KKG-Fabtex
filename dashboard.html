<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - KKG FABTEX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <nav class="navbar dashboard-nav">
        <div class="nav-container">
            <div class="logo-section">
                <img src="assets/logo.png" alt="KKG FABTEX" class="logo-small">
                <span class="nav-title">PO Management System</span>
            </div>
            <div class="nav-right">
                <a href="modules.html" class="btn-secondary" style="font-size: 0.85rem; padding: 0.5rem 1.2rem;">← Modules</a>
                <span class="user-name" id="userName"></span>
                <button onclick="logout()" class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>Purchase Orders Dashboard</h1>
            <div style="display: flex; gap: 1rem;">
                <button onclick="removePO()" class="btn-secondary" style="background: #dc2626; color: white; border: none;">🗑️ Delete PO</button>
                <a href="create-po.html" class="btn-primary">+ Create New PO</a>
            </div>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-number" id="totalPOs">-</div>
                <div class="stat-label">Total POs</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="nextPONumber">-</div>
                <div class="stat-label">Next PO Number</div>
            </div>
        </div>

        <div class="po-list-section">
            <h2>Recent Purchase Orders</h2>
            <div class="search-bar">
                <input type="text" id="searchPO" placeholder="Search by PO number, supplier name...">
            </div>
            <div id="poList" class="po-list">
                <!-- POs will be loaded here -->
            </div>
            <div id="emptyState" class="empty-state">
                <p>📄 No purchase orders yet</p>
                <p>Create your first PO to get started!</p>
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
    <script src="pdf-generator.js"></script>
    <script>
        // Check if user is logged in
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'login.html';
        }

        // Display username
        document.getElementById('userName').textContent = localStorage.getItem('currentUser');

        // In-memory cache for POs (used by viewPO and downloadPO)
        var cachedPOs = [];

        // Initialize
        async function init() {
            await DB.migrateFromLocalStorage();
            await loadPOs();
        }

        async function loadPOs() {
            var pos = await DB.getPOs();
            var currentPONumber = await DB.getCounter('currentPONumber');

            cachedPOs = pos;

            var poList = document.getElementById('poList');
            var emptyState = document.getElementById('emptyState');
            var totalPOsEl = document.getElementById('totalPOs');
            var nextPOEl = document.getElementById('nextPONumber');

            totalPOsEl.textContent = pos.length;
            nextPOEl.textContent = currentPONumber + 1;

            if (pos.length === 0) {
                emptyState.style.display = 'block';
                poList.style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            poList.style.display = 'block';

            // Sort by PO number (newest first)
            pos.sort(function(a, b) { return b.poNumber - a.poNumber; });

            poList.innerHTML = pos.map(function(po) {
                return '<div class="po-card">' +
                    '<div class="po-header">' +
                        '<div>' +
                            '<h3>PO #' + po.poNumber + '</h3>' +
                            '<p class="po-date">Created: ' + po.date + ' by ' + po.createdBy + '</p>' +
                        '</div>' +
                        '<div class="po-actions">' +
                            '<button onclick="viewPO(' + po.poNumber + ')" class="btn-view">View</button>' +
                            '<a href="create-po.html?edit=' + po.poNumber + '" class="btn-view" style="background: #d97706; text-decoration: none; text-align: center;">Edit</a>' +
                            '<button onclick="downloadPO(' + po.poNumber + ')" class="btn-download">Download PDF</button>' +
                        '</div>' +
                    '</div>' +
                    '<div class="po-details">' +
                        '<p><strong>Supplier:</strong> ' + po.supplierName + '</p>' +
                        '<p><strong>Item:</strong> ' + po.itemDescription.substring(0, 100) + (po.itemDescription.length > 100 ? '...' : '') + '</p>' +
                        '<p><strong>Quantity:</strong> ' + po.quantity + ' | <strong>Rate:</strong> Rs ' + po.rate + '</p>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function viewPO(poNumber) {
            var po = cachedPOs.find(function(p) { return p.poNumber === poNumber; });

            if (po) {
                var details = '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n' +
                    'PURCHASE ORDER #' + po.poNumber + '\n' +
                    '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n' +
                    'Date: ' + po.date + '\n' +
                    'Created by: ' + po.createdBy + '\n\n' +
                    'SUPPLIER INFORMATION\n' +
                    '────────────────────\n' +
                    po.supplierName + '\n' +
                    po.supplierAddress + '\n\n' +
                    'ITEM DETAILS\n' +
                    '────────────────────\n' +
                    po.itemDescription + '\n\n' +
                    'Quantity: ' + po.quantity + '\n' +
                    'Rate: Rs ' + po.rate + '\n' +
                    'Remarks: ' + (po.remarks || 'N/A') + '\n\n' +
                    'TERMS\n' +
                    '────────────────────\n' +
                    'Delivery: ' + po.deliveryDate + '\n' +
                    'Payment Terms: ' + po.paymentTerms + '\n\n' +
                    '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━';
                alert(details);
            }
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }

        async function removePO() {
            var pos = cachedPOs;

            if (pos.length === 0) {
                alert('No purchase orders to remove!');
                return;
            }

            var poNumberStr = prompt('Enter the PO number you want to delete:');

            if (!poNumberStr) {
                return;
            }

            var poNumber = parseInt(poNumberStr);

            if (isNaN(poNumber)) {
                alert('❌ Invalid PO number entered!');
                return;
            }

            var poToDelete = pos.find(function(p) { return p.poNumber === poNumber; });

            if (!poToDelete) {
                alert('❌ PO #' + poNumber + ' not found.');
                return;
            }

            var confirmMessage = '⚠️ CONFIRM DELETION:\n\n' +
                'PO #' + poToDelete.poNumber + '\n' +
                'Supplier: ' + poToDelete.supplierName + '\n' +
                'Date: ' + poToDelete.date + '\n\n' +
                'This action CANNOT be undone!\n\n' +
                'Type "DELETE" to confirm:';

            var confirmation = prompt(confirmMessage);

            if (confirmation === 'DELETE') {
                await DB.deletePO(poNumber);

                // Update counter
                var remainingPOs = pos.filter(function(p) { return p.poNumber !== poNumber; });

                if (remainingPOs.length === 0) {
                    await DB.setCounter('currentPONumber', poNumber - 1);
                } else {
                    var highestRemaining = Math.max.apply(null, remainingPOs.map(function(p) { return p.poNumber; }));
                    if (poNumber > highestRemaining) {
                        await DB.setCounter('currentPONumber', poNumber - 1);
                    } else {
                        await DB.setCounter('currentPONumber', highestRemaining);
                    }
                }

                alert('✅ PO #' + poNumber + ' has been deleted successfully!');
                location.reload();
            } else {
                alert('❌ Deletion cancelled. Confirmation text did not match.');
            }
        }

        // Search functionality
        document.getElementById('searchPO').addEventListener('input', function(e) {
            var searchTerm = e.target.value.toLowerCase();
            var poCards = document.querySelectorAll('.po-card');

            poCards.forEach(function(card) {
                var text = card.textContent.toLowerCase();
                card.style.display = text.includes(searchTerm) ? 'block' : 'none';
            });
        });

        // Start loading data
        init();
    </script>
</body>
</html>
