<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecovero Certificates - KKG FABTEX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <nav class="navbar dashboard-nav">
        <div class="nav-container">
            <div class="logo-section">
                <img src="assets/logo.png" alt="KKG FABTEX" class="logo-small">
                <span class="nav-title">Ecovero Certificates</span>
            </div>
            <div class="nav-right">
                <a href="modules.html" class="btn-secondary" style="font-size: 0.85rem; padding: 0.5rem 1.2rem;">← Modules</a>
                <span class="user-name" id="userName"></span>
                <button onclick="logout()" class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>Ecovero Certificates Dashboard</h1>
            <div style="display: flex; gap: 1rem;">
                <button onclick="removeCert()" class="btn-secondary" style="background: #dc2626; color: white; border: none;">🗑️ Delete Certificate</button>
                <a href="create-certificate.html" class="btn-primary">+ Create New Certificate</a>
            </div>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-number" id="totalCerts">-</div>
                <div class="stat-label">Total Certificates</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="nextCertNumber">-</div>
                <div class="stat-label">Next Ref. No.</div>
            </div>
        </div>

        <div class="po-list-section">
            <h2>Recent Certificates</h2>
            <div class="search-bar">
                <input type="text" id="searchCert" placeholder="Search by ref number, buyer name, manufacturer...">
            </div>
            <div id="certList" class="po-list">
                <!-- Certificates will be loaded here -->
            </div>
            <div id="emptyState" class="empty-state">
                <p>📜 No certificates yet</p>
                <p>Create your first Ecovero certificate to get started!</p>
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
    <script src="cert-pdf-generator.js"></script>
    <script>
        // Check if user is logged in
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'login.html';
        }

        // Display username
        document.getElementById('userName').textContent = localStorage.getItem('currentUser');

        // In-memory cache for certs
        var cachedCerts = [];

        async function init() {
            await DB.migrateFromLocalStorage();
            await loadCerts();
        }

        async function loadCerts() {
            var certs = await DB.getCerts();
            var currentCertNumber = await DB.getCounter('currentCertNumber');

            cachedCerts = certs;

            var certList = document.getElementById('certList');
            var emptyState = document.getElementById('emptyState');
            var totalCertsEl = document.getElementById('totalCerts');
            var nextCertEl = document.getElementById('nextCertNumber');

            totalCertsEl.textContent = certs.length;
            nextCertEl.textContent = currentCertNumber + 1;

            if (certs.length === 0) {
                emptyState.style.display = 'block';
                certList.style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            certList.style.display = 'block';

            // Sort by ref number (newest first)
            certs.sort(function(a, b) { return b.refNumber - a.refNumber; });

            certList.innerHTML = certs.map(function(cert) {
                var invSummary = cert.invoices.map(function(inv) { return 'Inv#' + inv.invoiceNo + ' (' + inv.meters + 'm)'; }).join(', ');
                return '<div class="po-card">' +
                    '<div class="po-header">' +
                        '<div>' +
                            '<h3>KKG/' + cert.refNumber + '</h3>' +
                            '<p class="po-date">Dated: ' + cert.date + ' | Created by: ' + cert.createdBy + '</p>' +
                        '</div>' +
                        '<div class="po-actions">' +
                            '<button onclick="viewCert(' + cert.refNumber + ')" class="btn-view">View</button>' +
                            '<a href="create-certificate.html?edit=' + cert.refNumber + '" class="btn-view" style="background: #d97706; text-decoration: none; text-align: center;">Edit</a>' +
                            '<button onclick="downloadCert(' + cert.refNumber + ')" class="btn-download">Download PDF</button>' +
                        '</div>' +
                    '</div>' +
                    '<div class="po-details">' +
                        '<p><strong>Buyer:</strong> ' + cert.buyerName + '</p>' +
                        '<p><strong>Fabric:</strong> ' + cert.fabricDescription.substring(0, 80) + (cert.fabricDescription.length > 80 ? '...' : '') + '</p>' +
                        '<p><strong>Invoice(s):</strong> ' + invSummary + '</p>' +
                        '<p><strong>Manufacturer:</strong> ' + cert.manufacturerName + '</p>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function viewCert(refNumber) {
            var cert = cachedCerts.find(function(c) { return c.refNumber === refNumber; });

            if (cert) {
                var invDetails = cert.invoices.map(function(inv) {
                    return '  Invoice No. ' + inv.invoiceNo + ' | Dated ' + inv.invoiceDate + ' | ' + inv.meters + ' Meters';
                }).join('\n');

                var details = '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n' +
                    'CERTIFICATE KKG/' + cert.refNumber + '\n' +
                    '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n' +
                    'Date: ' + cert.date + '\n' +
                    'Certificate No: ' + cert.certificateNo + '\n' +
                    'Created by: ' + cert.createdBy + '\n\n' +
                    'BUYER\n' +
                    '────────────────────\n' +
                    cert.buyerName + '\n' +
                    cert.buyerAddress + '\n\n' +
                    'FABRIC\n' +
                    '────────────────────\n' +
                    cert.fabricDescription + '\n\n' +
                    'INVOICE(S)\n' +
                    '────────────────────\n' +
                    invDetails + '\n\n' +
                    'MANUFACTURER\n' +
                    '────────────────────\n' +
                    cert.manufacturerName + '\n' +
                    'Yarn Producer: ' + cert.yarnProducer + '\n' +
                    'Contact: ' + cert.contactPerson + '\n' +
                    'Phone: ' + cert.telephone + '\n' +
                    'Email: ' + cert.email + '\n\n' +
                    '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━';
                alert(details);
            }
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }

        async function removeCert() {
            var certs = cachedCerts;

            if (certs.length === 0) {
                alert('No certificates to remove!');
                return;
            }

            var refStr = prompt('Enter the Ref. No. you want to delete (number only, e.g. 61):');

            if (!refStr) {
                return;
            }

            var refNumber = parseInt(refStr);

            if (isNaN(refNumber)) {
                alert('❌ Invalid Ref. No. entered!');
                return;
            }

            var certToDelete = certs.find(function(c) { return c.refNumber === refNumber; });

            if (!certToDelete) {
                alert('❌ Certificate KKG/' + refNumber + ' not found.');
                return;
            }

            var confirmMessage = '⚠️ CONFIRM DELETION:\n\n' +
                'Certificate KKG/' + certToDelete.refNumber + '\n' +
                'Buyer: ' + certToDelete.buyerName + '\n' +
                'Date: ' + certToDelete.date + '\n\n' +
                'This action CANNOT be undone!\n\n' +
                'Type "DELETE" to confirm:';

            var confirmation = prompt(confirmMessage);

            if (confirmation === 'DELETE') {
                await DB.deleteCert(refNumber);

                var remaining = certs.filter(function(c) { return c.refNumber !== refNumber; });

                if (remaining.length === 0) {
                    await DB.setCounter('currentCertNumber', refNumber - 1);
                } else {
                    var highestRemaining = Math.max.apply(null, remaining.map(function(c) { return c.refNumber; }));
                    if (refNumber > highestRemaining) {
                        await DB.setCounter('currentCertNumber', refNumber - 1);
                    } else {
                        await DB.setCounter('currentCertNumber', highestRemaining);
                    }
                }

                alert('✅ Certificate KKG/' + refNumber + ' has been deleted successfully!');
                location.reload();
            } else {
                alert('❌ Deletion cancelled. Confirmation text did not match.');
            }
        }

        // Search functionality
        document.getElementById('searchCert').addEventListener('input', function(e) {
            var searchTerm = e.target.value.toLowerCase();
            var certCards = document.querySelectorAll('.po-card');

            certCards.forEach(function(card) {
                var text = card.textContent.toLowerCase();
                card.style.display = text.includes(searchTerm) ? 'block' : 'none';
            });
        });

        // Start loading data
        init();
    </script>
</body>
</html>
