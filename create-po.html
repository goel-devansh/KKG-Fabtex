<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create PO - KKG FABTEX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <nav class="navbar dashboard-nav">
        <div class="nav-container">
            <div class="logo-section">
                <img src="assets/logo.png" alt="KKG FABTEX" class="logo-small">
                <span class="nav-title">Create Purchase Order</span>
            </div>
            <div class="nav-right">
                <a href="dashboard.html" class="btn-secondary">← Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="form-container">
        <div class="form-box">
            <h2>New Purchase Order</h2>
            <p class="next-po-info">Next PO Number: <strong id="nextPODisplay">...</strong></p>

            <form id="poForm">
                <div class="form-section" id="sectionSupplier">
                    <h3><span class="step-badge">1</span> Supplier Information</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="supplierSelect">Select Supplier *</label>
                            <select id="supplierSelect">
                                <option value="">-- Add New Supplier --</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="supplierName">Supplier's Name *</label>
                            <input type="text" id="supplierName" required placeholder="Enter supplier name">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="supplierAddress">Address *</label>
                            <textarea id="supplierAddress" required placeholder="Enter supplier address" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="section-next">
                        <button type="button" id="btnNextToItems" class="btn-primary">Next: Item Details →</button>
                    </div>
                </div>

                <div class="form-section section-hidden" id="sectionItems">
                    <h3><span class="step-badge">2</span> Item Details</h3>
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label for="itemDescription">Item Description *</label>
                            <div class="organic-toggle-row">
                                <button type="button" id="organicToggle" class="btn-organic" onclick="toggleOrganic()">🌿 Organic PO</button>
                            </div>
                            <textarea id="itemDescription" required placeholder="e.g., GREIGE WOVEN FABRICS 100% ORGANIC COTTON VOIL 80x72 63&quot; ORGANIC" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="quantity">Quantity (MTS) *</label>
                            <div class="input-with-suffix">
                                <input type="text" id="quantity" required placeholder="e.g., 3500" inputmode="numeric">
                                <span class="input-suffix">MTS</span>
                            </div>
                            <span id="quantityError" class="field-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="rate">Rate (Rs) *</label>
                            <input type="number" id="rate" step="0.01" required placeholder="e.g., 46.00">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="remarksSelect">Remarks</label>
                            <select id="remarksSelect">
                                <option value="98L">98L</option>
                                <option value="100L">100L</option>
                                <option value="custom">-- Enter Manually --</option>
                            </select>
                            <input type="text" id="remarksManual" placeholder="Enter remarks" style="display: none; margin-top: 0.5rem;">
                        </div>
                    </div>
                    <div class="section-next">
                        <button type="button" id="btnNextToTerms" class="btn-primary">Next: Terms & Delivery →</button>
                    </div>
                </div>

                <div class="form-section section-hidden" id="sectionTerms">
                    <h3><span class="step-badge">3</span> Terms & Delivery</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="poDate">PO Date *</label>
                            <input type="date" id="poDate" required>
                        </div>
                        <div class="form-group">
                            <label for="deliveryDate">Delivery Date *</label>
                            <input type="text" id="deliveryDate" required placeholder="e.g., IMMEDIATE or specific date">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="paymentTermsSelect">Payment Terms *</label>
                            <select id="paymentTermsSelect">
                                <option value="60 DAYS">60 DAYS</option>
                                <option value="90 DAYS" selected>90 DAYS</option>
                                <option value="120 DAYS">120 DAYS</option>
                                <option value="custom">-- Enter Manually --</option>
                            </select>
                            <input type="text" id="paymentTermsManual" placeholder="Enter payment terms" style="display: none; margin-top: 0.5rem;">
                        </div>
                        <div class="form-group">
                            <!-- Empty to maintain grid layout -->
                        </div>
                    </div>
                </div>

                <div class="form-actions section-hidden" id="sectionActions">
                    <button type="button" onclick="window.location.href='dashboard.html'" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Generate PO</button>
                </div>
            </form>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
    <script>
        // Check if user is logged in
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'login.html';
        }

        // Check if we're in edit mode
        var urlParams = new URLSearchParams(window.location.search);
        var editPONumber = urlParams.get('edit') ? parseInt(urlParams.get('edit')) : null;
        var editingPO = null;
        var currentPONumber = 259;

        // Set today's date as default
        var today = new Date().toISOString().split('T')[0];
        document.getElementById('poDate').value = today;

        // Format date from YYYY-MM-DD to DD/MM/YYYY
        function formatPODate(dateString) {
            var date = new Date(dateString);
            var day = String(date.getDate()).padStart(2, '0');
            var month = String(date.getMonth() + 1).padStart(2, '0');
            var year = date.getFullYear();
            return day + '/' + month + '/' + year;
        }

        // Hardcoded supplier list
        var SUPPLIERS = [
            { name: 'JHEEVA REKHAA TEXTILES', address: 'TAMIL NADU - 625512' },
            { name: 'SKY WEAVES', address: 'TIRUPUR, TAMIL NADU - 641605' },
            { name: 'MADURAI WEAVING MILLS', address: 'TAMIL NADU' },
            { name: 'MAHESH TEXFAB', address: 'ICHALKARANJI, MAHARASHTRA - 416115' }
        ];

        // Populate supplier dropdown
        var supplierSelect = document.getElementById('supplierSelect');
        var supplierNameInput = document.getElementById('supplierName');
        var supplierAddressInput = document.getElementById('supplierAddress');

        SUPPLIERS.forEach(function(supplier, index) {
            var option = document.createElement('option');
            option.value = index;
            option.textContent = supplier.name;
            supplierSelect.appendChild(option);
        });

        // Handle supplier selection change
        supplierSelect.addEventListener('change', function() {
            var selectedIndex = this.value;

            if (selectedIndex === '') {
                supplierNameInput.value = '';
                supplierAddressInput.value = '';
                supplierNameInput.readOnly = false;
                supplierAddressInput.readOnly = false;
                supplierNameInput.classList.remove('field-prefilled');
                supplierAddressInput.classList.remove('field-prefilled');
                supplierNameInput.placeholder = 'Enter supplier name';
                supplierAddressInput.placeholder = 'Enter supplier address';
            } else {
                var supplier = SUPPLIERS[parseInt(selectedIndex)];
                supplierNameInput.value = supplier.name;
                supplierAddressInput.value = supplier.address;
                supplierNameInput.readOnly = true;
                supplierAddressInput.readOnly = true;
                supplierNameInput.classList.add('field-prefilled');
                supplierAddressInput.classList.add('field-prefilled');
                supplierNameInput.placeholder = '';
                supplierAddressInput.placeholder = '';
            }
        });

        // Organic PO toggle
        var isOrganic = false;
        var organicPrefix = 'GREIGE WOVEN FABRIC 100% ORGANIC COTTON ';
        var itemDescriptionInput = document.getElementById('itemDescription');

        function toggleOrganic() {
            var btn = document.getElementById('organicToggle');
            isOrganic = !isOrganic;

            if (isOrganic) {
                btn.classList.add('btn-organic-active');
                btn.textContent = '🌿 Organic PO ✓';
                if (!itemDescriptionInput.value.toUpperCase().startsWith(organicPrefix)) {
                    itemDescriptionInput.value = organicPrefix + itemDescriptionInput.value;
                }
            } else {
                btn.classList.remove('btn-organic-active');
                btn.textContent = '🌿 Organic PO';
                if (itemDescriptionInput.value.toUpperCase().startsWith(organicPrefix)) {
                    itemDescriptionInput.value = itemDescriptionInput.value.substring(organicPrefix.length);
                }
            }
        }

        // Remarks dropdown handler
        var remarksSelect = document.getElementById('remarksSelect');
        var remarksManual = document.getElementById('remarksManual');

        remarksSelect.addEventListener('change', function() {
            if (this.value === 'custom') {
                remarksManual.style.display = 'block';
                remarksManual.focus();
            } else {
                remarksManual.style.display = 'none';
                remarksManual.value = '';
            }
        });

        // Payment Terms dropdown handler
        var paymentTermsSelect = document.getElementById('paymentTermsSelect');
        var paymentTermsManual = document.getElementById('paymentTermsManual');

        paymentTermsSelect.addEventListener('change', function() {
            if (this.value === 'custom') {
                paymentTermsManual.style.display = 'block';
                paymentTermsManual.required = true;
                paymentTermsManual.focus();
            } else {
                paymentTermsManual.style.display = 'none';
                paymentTermsManual.required = false;
                paymentTermsManual.value = '';
            }
        });

        // Quantity validation
        var quantityInput = document.getElementById('quantity');
        var quantityError = document.getElementById('quantityError');

        quantityInput.addEventListener('input', function() {
            var raw = this.value.replace(/,/g, '');
            if (raw !== '' && !/^\d+$/.test(raw)) {
                quantityError.textContent = 'Please enter numbers only';
                quantityError.style.display = 'block';
                this.classList.add('input-error');
            } else {
                quantityError.textContent = '';
                quantityError.style.display = 'none';
                this.classList.remove('input-error');
            }
        });

        // Step navigation
        var sectionItems = document.getElementById('sectionItems');
        var sectionTerms = document.getElementById('sectionTerms');
        var sectionActions = document.getElementById('sectionActions');

        function switchSection(currentSection, nextSections, focusEl) {
            var switched = false;
            function doSwitch() {
                if (switched) return;
                switched = true;
                currentSection.classList.add('section-hidden');
                currentSection.classList.remove('section-fade-out');
                nextSections.forEach(function(sec) {
                    sec.classList.remove('section-hidden');
                    sec.classList.add('section-reveal');
                });
                if (focusEl) focusEl.focus();
                nextSections[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            currentSection.classList.add('section-fade-out');
            currentSection.addEventListener('animationend', doSwitch, { once: true });
            setTimeout(doSwitch, 400);
        }

        // Step 1 → Step 2
        document.getElementById('btnNextToItems').addEventListener('click', function() {
            var name = supplierNameInput.value.trim();
            var address = supplierAddressInput.value.trim();

            if (!name || !address) {
                alert('Please fill in supplier name and address before proceeding.');
                if (!name) supplierNameInput.focus();
                else supplierAddressInput.focus();
                return;
            }

            switchSection(document.getElementById('sectionSupplier'), [sectionItems], document.getElementById('itemDescription'));
        });

        // Step 2 → Step 3
        document.getElementById('btnNextToTerms').addEventListener('click', function() {
            var desc = document.getElementById('itemDescription').value.trim();
            var qty = quantityInput.value.trim();
            var rate = document.getElementById('rate').value.trim();

            if (!desc || !qty || !rate) {
                alert('Please fill in item description, quantity, and rate before proceeding.');
                if (!desc) document.getElementById('itemDescription').focus();
                else if (!qty) quantityInput.focus();
                else document.getElementById('rate').focus();
                return;
            }

            var qtyClean = qty.replace(/,/g, '');
            if (!/^\d+$/.test(qtyClean)) {
                quantityError.textContent = 'Please enter numbers only';
                quantityError.style.display = 'block';
                quantityInput.classList.add('input-error');
                quantityInput.focus();
                return;
            }

            switchSection(sectionItems, [sectionTerms, sectionActions], document.getElementById('deliveryDate'));
        });

        // Handle form submission
        document.getElementById('poForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validate quantity is numeric
            var qtyRaw = quantityInput.value.replace(/,/g, '');
            if (!/^\d+$/.test(qtyRaw)) {
                quantityError.textContent = 'Please enter numbers only';
                quantityError.style.display = 'block';
                quantityInput.classList.add('input-error');
                quantityInput.focus();
                return;
            }

            var quantityValue = quantityInput.value.trim() + ' MTS';
            var remarksValue = remarksSelect.value === 'custom' ? remarksManual.value : remarksSelect.value;
            var paymentTermsValue = paymentTermsSelect.value === 'custom' ? paymentTermsManual.value : paymentTermsSelect.value;

            if (editingPO) {
                // Update existing PO
                editingPO.date = formatPODate(document.getElementById('poDate').value);
                editingPO.supplierName = document.getElementById('supplierName').value;
                editingPO.supplierAddress = document.getElementById('supplierAddress').value;
                editingPO.itemDescription = document.getElementById('itemDescription').value;
                editingPO.quantity = quantityValue;
                editingPO.rate = document.getElementById('rate').value;
                editingPO.remarks = remarksValue;
                editingPO.deliveryDate = document.getElementById('deliveryDate').value;
                editingPO.paymentTerms = paymentTermsValue;

                await DB.savePO(editingPO);
                alert('Purchase Order #' + editingPO.poNumber + ' updated successfully!');
                window.location.href = 'dashboard.html';
            } else {
                // Create new PO
                var newNumber = await DB.incrementCounter('currentPONumber');

                var po = {
                    poNumber: newNumber,
                    date: formatPODate(document.getElementById('poDate').value),
                    supplierName: document.getElementById('supplierName').value,
                    supplierAddress: document.getElementById('supplierAddress').value,
                    itemDescription: document.getElementById('itemDescription').value,
                    quantity: quantityValue,
                    rate: document.getElementById('rate').value,
                    remarks: remarksValue,
                    deliveryDate: document.getElementById('deliveryDate').value,
                    paymentTerms: paymentTermsValue,
                    createdBy: localStorage.getItem('currentUser'),
                    createdAt: new Date().toISOString()
                };

                await DB.savePO(po);
                alert('Purchase Order #' + po.poNumber + ' created successfully!');
                window.location.href = 'dashboard.html';
            }
        });

        // Initialize - load counter and edit data from Firestore
        async function init() {
            await DB.migrateFromLocalStorage();

            currentPONumber = await DB.getCounter('currentPONumber');

            if (editPONumber) {
                editingPO = await DB.getPO(editPONumber);
            }

            if (editingPO) {
                document.querySelector('.nav-title').textContent = 'Edit Purchase Order';
                document.querySelector('.form-box h2').textContent = 'Edit Purchase Order #' + editingPO.poNumber;
                document.querySelector('.next-po-info').style.display = 'none';
                document.querySelector('.form-actions .btn-primary').textContent = 'Update PO';

                // Pre-fill supplier
                var supplierIdx = SUPPLIERS.findIndex(function(s) { return s.name === editingPO.supplierName; });
                if (supplierIdx >= 0) {
                    supplierSelect.value = supplierIdx;
                    supplierSelect.dispatchEvent(new Event('change'));
                } else {
                    supplierSelect.value = '';
                    supplierNameInput.value = editingPO.supplierName;
                    supplierAddressInput.value = editingPO.supplierAddress;
                    supplierNameInput.readOnly = false;
                    supplierAddressInput.readOnly = false;
                }

                // Item details
                document.getElementById('itemDescription').value = editingPO.itemDescription;
                document.getElementById('quantity').value = editingPO.quantity.replace(' MTS', '');
                document.getElementById('rate').value = editingPO.rate;

                // Remarks
                var remarksVal = editingPO.remarks || '';
                if (remarksVal === '98L' || remarksVal === '100L') {
                    document.getElementById('remarksSelect').value = remarksVal;
                } else if (remarksVal) {
                    document.getElementById('remarksSelect').value = 'custom';
                    document.getElementById('remarksManual').style.display = 'block';
                    document.getElementById('remarksManual').value = remarksVal;
                }

                // PO Date
                var dateParts = editingPO.date.split('/');
                if (dateParts.length === 3) {
                    document.getElementById('poDate').value = dateParts[2] + '-' + dateParts[1] + '-' + dateParts[0];
                }

                // Delivery date
                document.getElementById('deliveryDate').value = editingPO.deliveryDate;

                // Payment terms
                var ptVal = editingPO.paymentTerms;
                if (ptVal === '60 DAYS' || ptVal === '90 DAYS' || ptVal === '120 DAYS') {
                    document.getElementById('paymentTermsSelect').value = ptVal;
                } else {
                    document.getElementById('paymentTermsSelect').value = 'custom';
                    document.getElementById('paymentTermsManual').style.display = 'block';
                    document.getElementById('paymentTermsManual').value = ptVal;
                }

                // Show all sections at once for editing
                document.getElementById('sectionSupplier').classList.remove('section-hidden');
                document.getElementById('sectionItems').classList.remove('section-hidden');
                document.getElementById('sectionTerms').classList.remove('section-hidden');
                document.getElementById('sectionActions').classList.remove('section-hidden');
                document.querySelectorAll('.section-next').forEach(function(el) { el.style.display = 'none'; });
            } else {
                document.getElementById('nextPODisplay').textContent = currentPONumber + 1;
            }
        }

        init();
    </script>
</body>
</html>
